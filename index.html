<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vítejte v CASINO BONBON</title>
    <style>
        /* Základní styly pro sladký a luxusní look */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #2d5a4c 0%, #1a3a32 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Pro létající bonbóny */
        }

        /* Hlavní kontejner s neonovým efektem */
        .welcome-container {
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 60px 80px;
            border-radius: 20px;
            border: 2px solid #f1c40f;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.3), inset 0 0 15px rgba(241, 196, 15, 0.2);
            backdrop-filter: blur(5px);
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .welcome-container:hover {
            transform: scale(1.02);
        }

        /* Styl pro hlavní nadpis */
        h1 {
            font-size: 4em;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.7), 2px 2px 0px #c0392b;
            animation: glow 2s ease-in-out infinite alternate;
        }

        /* Styl pro podnadpis */
        h2 {
            font-size: 1.8em;
            font-weight: 300;
            margin: 10px 0 40px 0;
            color: #ecf0f1;
            font-style: italic;
            letter-spacing: 1px;
        }

        /* Luxusní "bonbónové" tlačítko */
        .enter-btn {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.5em;
            font-weight: bold;
            text-decoration: none;
            color: white;
            background: linear-gradient(45deg, #e67e22, #d35400);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #a34000, 0 8px 15px rgba(0,0,0,0.4);
            transition: all 0.1s ease;
            text-transform: uppercase;
        }

        .enter-btn:hover {
            background: linear-gradient(45deg, #f39c12, #e67e22);
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #a34000, 0 10px 20px rgba(0,0,0,0.5);
        }

        .enter-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #a34000, 0 3px 10px rgba(0,0,0,0.6);
        }

        /* Animace pulzování nadpisu */
        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(241, 196, 15, 0.7), 2px 2px 0px #c0392b; }
            to { text-shadow: 0 0 20px rgba(241, 196, 15, 1), 2px 2px 0px #c0392b; }
        }

        /* Styl pro létající bonbóny na pozadí */
        .candy {
            position: absolute;
            font-size: 2em;
            opacity: 0.2;
            user-select: none;
            z-index: 1;
            animation: fly linear infinite;
        }

        @keyframes fly {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }

        /* Responzivita pro mobily */
        @media (max-width: 600px) {
            .welcome-container { padding: 30px; width: 80%; }
            h1 { font-size: 2.5em; letter-spacing: 2px; }
            h2 { font-size: 1.2em; }
            .enter-btn { font-size: 1.2em; width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>

    <div id="candy-wrap"></div>

    <div class="welcome-container">
        <h1>CASINO BONBON</h1>
        <h2>Hraj a vyhraj!</h2>
        <a href="kasino.html" class="enter-btn">Vstoupit do hry</a>
    </div>

    <script>
        // Funkce pro vygenerování létajících bonbónů na pozadí
        function createCandies() {
            const container = document.getElementById('candy-wrap');
            const candyTypes = ['🍬', '🍭', '🍩', '🍫', '🍒', '🐻'];
            const candyCount = 15; // Kolik bonbónů chceme

            for (let i = 0; i < candyCount; i++) {
                const candy = document.createElement('div');
                candy.className = 'candy';
                candy.innerText = candyTypes[Math.floor(Math.random() * candyTypes.length)];
                
                // Náhodná pozice a rychlost
                candy.style.left = Math.random() * 100 + 'vw';
                candy.style.animationDuration = (Math.random() * 10 + 5) + 's'; // 5-15s
                candy.style.animationDelay = (Math.random() * 5) + 's';
                candy.style.fontSize = (Math.random() * 1.5 + 1) + 'em'; // Různé velikosti

                container.appendChild(candy);
                <p>Prohlédněte si můj projekt: <a href="cpp.html">Město Polička</a></p>
            }
        }

        // Spustit generování po načtení stránky
        window.onload = createCandies;
    </script>
</body>
</html>
